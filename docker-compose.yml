    ports:
      - "127.0.0.1:10416:10416"
    environment:
      - JAVA_OPTS=-Xmx128m

  ai-memory-frontend:
    build: ./ai-memory/frontend
    ports:
      - "127.0.0.1:10317:80"
    depends_on:
      - ai-memory-backend

  ai-memory-backend:
    build:
      context: .
      dockerfile: ai-memory/backend/Dockerfile
    ports:
