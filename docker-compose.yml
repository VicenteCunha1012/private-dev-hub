    ports:
      - "127.0.0.1:10314:80"
    depends_on:
      - secrets-vault-backend

  secrets-vault-backend:
    build:
      context: .
      dockerfile: secrets-vault/backend/Dockerfile
    ports:
      - "127.0.0.1:10414:10414"
    environment:
      - JAVA_OPTS=-Xmx128m
    depends_on:
      secrets-vault-db:
        condition: service_healthy

  secrets-vault-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: secretsvault
      POSTGRES_USER: secretsvault
