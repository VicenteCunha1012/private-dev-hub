services:

  hub-frontend:
    build: ./hub/frontend
    ports:
      - "127.0.0.1:10300:80"
    depends_on:
      - hub-backend

  hub-backend:
    build: ./hub/backend
    ports:
      - "127.0.0.1:10303:10303"
    environment:
      - JAVA_OPTS=-Xmx256m
    depends_on:
      hub-db:
        condition: service_healthy

  hub-db:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:10403:5432"
    environment:
      POSTGRES_DB: hub
      POSTGRES_USER: hub
      POSTGRES_PASSWORD: hub
    volumes:
      - hub-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hub -d hub"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafbat-plus-frontend:
    build: ./kafbat-plus/frontend
    ports:
      - "127.0.0.1:10301:80"
    depends_on:
      - kafbat-plus-backend

  kafbat-plus-backend:
    build:
      context: .
      dockerfile: kafbat-plus/backend/Dockerfile
    ports:
      - "127.0.0.1:10401:10401"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - JAVA_OPTS=-Xmx256m
    depends_on:
      kafbat-plus-db:
        condition: service_healthy

  kafbat-plus-db:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:10501:5432"
    environment:
      POSTGRES_DB: kafbat
      POSTGRES_USER: kafbat
      POSTGRES_PASSWORD: kafbat
    volumes:
      - kafbat-plus-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kafbat -d kafbat"]
      interval: 5s
      timeout: 5s
      retries: 10

  ai-session-manager-frontend:
    build: ./ai-session-manager/frontend
    ports:
      - "127.0.0.1:10302:80"
    depends_on:
      - ai-session-manager-backend

  ai-session-manager-backend:
    build: ./ai-session-manager/backend
    ports:
      - "127.0.0.1:10402:10402"
    environment:
      - JAVA_OPTS=-Xmx256m
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${HOME}/.claude:/home/user/.claude
      - ${HOME}/.local/share/opencode:/home/user/.opencode
      - ${HOME}/.config/opencode:/home/user/.opencode-config
      - ${HOME}/.claude.json:/home/user/.claude.json
      - ${HOME}/ai-config:/home/user/ai-config
      - ${HOME}/.config/rtk:/home/user/.config/rtk
      - ${HOME}/.gitconfig:/home/user/.gitconfig:ro

  json-tools-frontend:
    build: ./json-tools/frontend
    ports:
      - "127.0.0.1:10306:80"
    depends_on:
      - json-tools-backend

  json-tools-backend:
    build: ./json-tools/backend
    ports:
      - "127.0.0.1:10406:10406"
    environment:
      - JAVA_OPTS=-Xmx128m

  mock-data-generator-frontend:
    build: ./mock-data-generator/frontend
    ports:
      - "127.0.0.1:10308:80"
    depends_on:
      - mock-data-generator-backend

  mock-data-generator-backend:
    build:
      context: .
      dockerfile: mock-data-generator/backend/Dockerfile
    ports:
      - "127.0.0.1:10408:10408"
    environment:
      - JAVA_OPTS=-Xmx256m
    depends_on:
      mock-data-generator-db:
        condition: service_healthy

  mock-data-generator-db:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:10508:5432"
    environment:
      POSTGRES_DB: mockgen
      POSTGRES_USER: mockgen
      POSTGRES_PASSWORD: mockgen
    volumes:
      - mock-data-generator-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mockgen -d mockgen"]
      interval: 5s
      timeout: 5s
      retries: 10

  command-vault-frontend:
    build: ./command-vault/frontend
    ports:
      - "127.0.0.1:10309:80"
    depends_on:
      - command-vault-backend

  command-vault-backend:
    build:
      context: .
      dockerfile: command-vault/backend/Dockerfile
    ports:
      - "127.0.0.1:10409:10409"
    environment:
      - JAVA_OPTS=-Xmx128m
    depends_on:
      command-vault-db:
        condition: service_healthy

  command-vault-db:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:10509:5432"
    environment:
      POSTGRES_DB: commandvault
      POSTGRES_USER: commandvault
      POSTGRES_PASSWORD: commandvault
    volumes:
      - command-vault-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commandvault -d commandvault"]
      interval: 5s
      timeout: 5s
      retries: 10

  port-radar-frontend:
    build: ./port-radar/frontend
    ports:
      - "127.0.0.1:10310:80"
    depends_on:
      - port-radar-backend

  port-radar-backend:
    build: ./port-radar/backend
    ports:
      - "127.0.0.1:10410:10410"
    environment:
      - JAVA_OPTS=-Xmx128m
    volumes:
      - /proc:/host/proc:ro

  health-dashboard-frontend:
    build: ./health-dashboard/frontend
    ports:
      - "127.0.0.1:10311:80"
    depends_on:
      - health-dashboard-backend

  health-dashboard-backend:
    build: ./health-dashboard/backend
    ports:
      - "127.0.0.1:10411:10411"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - JAVA_OPTS=-Xmx128m

  todo-frontend:
    build: ./todo/frontend
    ports:
      - "127.0.0.1:10312:80"
    depends_on:
      - todo-backend

  todo-backend:
    build:
