      dockerfile: todo/backend/Dockerfile
    ports:
      - "127.0.0.1:10412:10412"
    environment:
      - JAVA_OPTS=-Xmx256m
    depends_on:
      todo-db:
        condition: service_healthy

  todo-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: todo
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
    ports:
      - "127.0.0.1:10512:5432"
    volumes:
      - todo-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo"]
      interval: 5s
      timeout: 5s
      retries: 5

  arcade-frontend:
