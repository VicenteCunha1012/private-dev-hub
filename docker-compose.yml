services:

  hub-frontend:
    build: ./hub/frontend
    ports:
      - "127.0.0.1:10300:80"
    depends_on:
      - hub-backend

  hub-backend:
    build: ./hub/backend
    ports:
      - "127.0.0.1:10303:10303"
    environment:
      - JAVA_OPTS=-Xmx256m
    depends_on:
      hub-db:
        condition: service_healthy

  hub-db:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:10403:5432"
    environment:
      POSTGRES_DB: hub
      POSTGRES_USER: hub
      POSTGRES_PASSWORD: hub
    volumes:
      - hub-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hub -d hub"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafbat-plus-frontend:
    build: ./kafbat-plus/frontend
    ports:
      - "127.0.0.1:10301:80"
    depends_on:
      - kafbat-plus-backend

  kafbat-plus-backend:
    build: ./kafbat-plus/backend
    ports:
      - "127.0.0.1:10401:10401"
    environment:
      - JAVA_OPTS=-Xmx256m
    depends_on:
      kafbat-plus-db:
        condition: service_healthy

  kafbat-plus-db:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:10501:5432"
    environment:
      POSTGRES_DB: kafbat
      POSTGRES_USER: kafbat
      POSTGRES_PASSWORD: kafbat
    volumes:
      - kafbat-plus-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kafbat -d kafbat"]
      interval: 5s
      timeout: 5s
      retries: 10

  ai-session-manager-frontend:
    build: ./ai-session-manager/frontend
    ports:
      - "127.0.0.1:10302:80"
    depends_on:
      - ai-session-manager-backend

  ai-session-manager-backend:
    build: ./ai-session-manager/backend
    ports:
      - "127.0.0.1:10402:10402"
    environment:
      - JAVA_OPTS=-Xmx256m
    volumes:
      - ${HOME}/.claude:/home/user/.claude:ro

  json-tools-frontend:
    build: ./json-tools/frontend
    ports:
      - "127.0.0.1:10306:80"
    depends_on:
      - json-tools-backend

  json-tools-backend:
    build: ./json-tools/backend
    ports:
      - "127.0.0.1:10406:10406"
    environment:
      - JAVA_OPTS=-Xmx128m

  mock-data-generator-frontend:
    build: ./mock-data-generator/frontend
    ports:
      - "127.0.0.1:10308:80"
    depends_on:
      - mock-data-generator-backend

  mock-data-generator-backend:
    build: ./mock-data-generator/backend
    ports:
      - "127.0.0.1:10408:10408"
    environment:
      - JAVA_OPTS=-Xmx256m
    depends_on:
      mock-data-generator-db:
        condition: service_healthy

  mock-data-generator-db:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:10508:5432"
    environment:
      POSTGRES_DB: mockgen
      POSTGRES_USER: mockgen
      POSTGRES_PASSWORD: mockgen
    volumes:
      - mock-data-generator-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mockgen -d mockgen"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  hub-db-data:
  kafbat-plus-db-data:
  mock-data-generator-db-data:
